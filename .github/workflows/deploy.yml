name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: 755254ba8a57616d082e385be2d6edb6

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist/ --project-name=daoshuday --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
